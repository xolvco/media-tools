name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test — ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch videoedit
        shell: bash
        env:
          CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [ -n "$CROSS_REPO_TOKEN" ]; then
            git clone --depth 1 --branch main "https://x-access-token:${CROSS_REPO_TOKEN}@github.com/xolvco/videoedit.git" videoedit
          else
            git clone --depth 1 --branch main https://github.com/xolvco/videoedit.git videoedit || {
              echo "::error::Unable to fetch xolvco/videoedit. Make the repo public or add a CROSS_REPO_TOKEN secret with read access."
              exit 1
            }
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./videoedit
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v
